<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@font-face{font-family:"Sora";font-weight:500;font-display:swap;src:url("assets/fonts/sora-500.woff2") format("woff2");}
@font-face{font-family:"Sora";font-weight:600;font-display:swap;src:url("assets/fonts/sora-600.woff2") format("woff2");}
@font-face{font-family:"Sora";font-weight:700;font-display:swap;src:url("assets/fonts/sora-700.woff2") format("woff2");}
@font-face{font-family:"Inter";font-weight:400;font-display:swap;src:url("assets/fonts/inter-400.woff2") format("woff2");}
@font-face{font-family:"Inter";font-weight:500;font-display:swap;src:url("assets/fonts/inter-500.woff2") format("woff2");}
@font-face{font-family:"Inter";font-weight:600;font-display:swap;src:url("assets/fonts/inter-600.woff2") format("woff2");}
@font-face{font-family:"Inter";font-weight:700;font-display:swap;src:url("assets/fonts/inter-700.woff2") format("woff2");}
</style>
</helmet>
<header style="position:sticky;top:0;z-index:50;background:#ffffff;border-bottom:1px solid rgba(12,8,1,0.1);font-family:'Inter',sans-serif;">
  <div style="max-width:1280px;margin:0 auto;padding:0 5%;min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:24px;">
    <a href="Home.dc.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;flex:none;">
      <img src="assets/logo.jpg" alt="Charlotte Chinese Academy" style="flex:none;width:48px;height:48px;border-radius:50%;display:block;object-fit:cover;" />
      <span style="display:flex;flex-direction:column;line-height:1.05;">
        <span style="font-family:'Sora',sans-serif;font-weight:700;font-size:16px;color:#0c0801;letter-spacing:-0.01em;">Charlotte Chinese Academy</span>
        <span style="font-family:'Inter',sans-serif;font-weight:500;font-size:11px;color:#858380;letter-spacing:0.08em;">夏洛特中文学校</span>
      </span>
    </a>

    <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
      <button onClick="{{ toggleMenu }}" aria-label="Menu" style="background:none;border:none;padding:8px;display:flex;flex-direction:column;gap:5px;flex:none;">
        <span style="display:block;width:24px;height:2px;background:#0c0801;"></span>
        <span style="display:block;width:24px;height:2px;background:#0c0801;"></span>
        <span style="display:block;width:24px;height:2px;background:#0c0801;"></span>
      </button>
    </sc-if>

    <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
      <nav style="display:flex;align-items:center;gap:4px;">
        <sc-for list="{{ navLinks }}" as="link" hint-placeholder-count="4">
          <a href="{{ link.href }}" style="padding:8px 14px;text-decoration:none;color:{{ link.color }};font-weight:{{ link.weight }};font-size:16px;">{{ link.label }}</a>
        </sc-for>
        <div onMouseEnter="{{ openMore }}" onMouseLeave="{{ closeMore }}" style="position:relative;">
          <button onClick="{{ toggleMore }}" style="background:none;border:none;padding:8px 14px;display:flex;align-items:center;gap:6px;color:#24201a;font-weight:500;font-size:16px;font-family:'Inter',sans-serif;">
            More
            <span style="font-size:11px;color:#858380;">▼</span>
          </button>
          <sc-if value="{{ moreOpen }}" hint-placeholder-val="{{ false }}">
            <div style="position:absolute;top:100%;left:0;min-width:200px;background:#ffffff;border:1px solid rgba(12,8,1,0.12);border-radius:8px;box-shadow:0 12px 32px rgba(12,8,1,0.12);padding:8px;display:flex;flex-direction:column;">
              <sc-for list="{{ moreLinks }}" as="link" hint-placeholder-count="3">
                <a href="{{ link.href }}" style="padding:10px 12px;border-radius:6px;text-decoration:none;color:{{ link.color }};font-weight:{{ link.weight }};font-size:15px;">{{ link.label }}</a>
              </sc-for>
            </div>
          </sc-if>
        </div>
        <div style="display:flex;align-items:center;gap:12px;margin-left:12px;">
          <a href="Contact.dc.html" style="padding:9px 18px;border:1px solid rgba(12,8,1,0.2);border-radius:6px;text-decoration:none;color:#0c0801;font-weight:600;font-size:15px;">Contact</a>
          <a href="https://chinese-school-platform.vercel.app/dashboard" target="_blank" rel="noopener" style="padding:10px 20px;background:#cc0000;border-radius:6px;text-decoration:none;color:#ffffff;font-weight:600;font-size:15px;">Register 报名</a>
        </div>
      </nav>
    </sc-if>
  </div>

  <sc-if value="{{ mobileMenuVisible }}" hint-placeholder-val="{{ false }}">
    <div style="border-top:1px solid rgba(12,8,1,0.08);padding:12px 5% 24px;display:flex;flex-direction:column;">
      <sc-for list="{{ allMobileLinks }}" as="link" hint-placeholder-count="6">
        <a href="{{ link.href }}" style="padding:12px 4px;text-decoration:none;color:{{ link.color }};font-weight:{{ link.weight }};font-size:18px;border-bottom:1px solid rgba(12,8,1,0.06);">{{ link.label }}</a>
      </sc-for>
      <div style="display:flex;gap:12px;margin-top:18px;">
        <a href="Contact.dc.html" style="flex:1;text-align:center;padding:12px;border:1px solid rgba(12,8,1,0.2);border-radius:6px;text-decoration:none;color:#0c0801;font-weight:600;font-size:15px;">Contact</a>
        <a href="https://chinese-school-platform.vercel.app/dashboard" target="_blank" rel="noopener" style="flex:1;text-align:center;padding:12px;background:#cc0000;border-radius:6px;text-decoration:none;color:#ffffff;font-weight:600;font-size:15px;">Register 报名</a>
      </div>
    </div>
  </sc-if>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:72},&quot;active&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { isMobile: false, menuOpen: false, moreOpen: false };

  componentDidMount() {
    this._mq = window.matchMedia("(max-width: 991px)");
    this._onChange = () => this.setState({ isMobile: this._mq.matches, menuOpen: false });
    this._onChange();
    this._mq.addEventListener("change", this._onChange);
  }
  componentWillUnmount() {
    if (this._mq) this._mq.removeEventListener("change", this._onChange);
  }

  renderVals() {
    const active = this.props.active || "";
    const mk = (label, href, key) => ({
      label, href,
      color: active === key ? "#cc0000" : "#24201a",
      weight: active === key ? 600 : 500,
    });
    const navLinks = [
      mk("About", "About.dc.html", "about"),
      mk("Academics", "Academics.dc.html", "academics"),
      mk("Admissions", "Admissions.dc.html", "admissions"),
      mk("News", "News.dc.html", "news"),
    ];
    const moreLinks = [
      mk("Volunteer", "Volunteer.dc.html", "volunteer"),
      mk("Donate", "Donate.dc.html", "donate"),
    ];
    const allMobileLinks = [
      ...navLinks,
      mk("Volunteer", "Volunteer.dc.html", "volunteer"),
      mk("Donate", "Donate.dc.html", "donate"),
    ];
    return {
      isMobile: this.state.isMobile,
      isDesktop: !this.state.isMobile,
      mobileMenuVisible: this.state.isMobile && this.state.menuOpen,
      moreOpen: this.state.moreOpen,
      navLinks, moreLinks, allMobileLinks,
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      toggleMore: () => this.setState(s => ({ moreOpen: !s.moreOpen })),
      openMore: () => this.setState({ moreOpen: true }),
      closeMore: () => this.setState({ moreOpen: false }),
    };
  }
}
</script>
</body>
</html>
